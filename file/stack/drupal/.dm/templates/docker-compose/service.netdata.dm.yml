netdata:
  container_name: ${APPSETTING_SERVICE_NETDATA_HOST}
  hostname: ${APPSETTING_SERVICE_NETDATA_HOST}
  build:
    context: .
    dockerfile: ./templates/dockerfile/netdata
    args:
      APPSETTING_SERVICE_NETDATA_BASE_IMAGE: ${APPSETTING_SERVICE_NETDATA_BASE_IMAGE}
  restart: unless-stopped
  init: true
  security_opt:
    - apparmor:unconfined
  cap_add:
    - SYS_PTRACE
  environment:
    # NETDATA_DISABLE_CLOUD no aplica en Netdata v2.x. Con Traefik el middleware redirige / → /v3 (sin splash Cloud).
    - DISABLE_TELEMETRY=1
    - DO_NOT_TRACK=1
  volumes:
    - netdata_config:/etc/netdata
    - netdata_lib:/var/lib/netdata
    - netdata_cache:/var/cache/netdata
    - /etc/passwd:/host/etc/passwd:ro
    - /etc/group:/host/etc/group:ro
    - /etc/localtime:/etc/localtime:ro
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /etc/os-release:/host/etc/os-release:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
  ports:
    - "127.0.0.1:19999:19999"
  labels:
    - "traefik.enable=true"
    - "traefik.http.routers.${APPSETTING_SERVICE_NETDATA_HOST}.rule=${APPSETTING_PROXY_SERVICE_NETDATA_RULE_HOST}"
    - "traefik.http.routers.${APPSETTING_SERVICE_NETDATA_HOST}.tls=true"
    # Sin esto, Netdata v2 muestra el splash de Netdata Cloud en /. La UI local sin ese paso está en /v3 (issue netdata#19007).
    - "traefik.http.middlewares.${APPSETTING_SERVICE_NETDATA_HOST}-nosplash.replacepathregex.regex=^/$$"
    - "traefik.http.middlewares.${APPSETTING_SERVICE_NETDATA_HOST}-nosplash.replacepathregex.replacement=/v3"
    - "traefik.http.routers.${APPSETTING_SERVICE_NETDATA_HOST}.middlewares=${APPSETTING_SERVICE_NETDATA_HOST}-nosplash"
    - "traefik.http.services.${APPSETTING_SERVICE_NETDATA_HOST}.loadbalancer.server.port=19999"
  networks:
    - dmproxy