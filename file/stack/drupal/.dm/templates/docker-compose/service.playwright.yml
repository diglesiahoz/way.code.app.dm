playwright:
  container_name: ${APPSETTING_SERVICE_PLAYWRIGHT_HOST}
  hostname: ${APPSETTING_SERVICE_PLAYWRIGHT_HOST}
  build:
    context: .
    dockerfile: ./templates/dockerfile/playwright
    args:
      APPSETTING_SERVICE_PLAYWRIGHT_BASE_IMAGE: ${APPSETTING_SERVICE_PLAYWRIGHT_BASE_IMAGE}
  restart: unless-stopped
  env_file:
    - ../.env
    - .env
  environment:
    PLAYWRIGHT_BASE_URL: http://${APPSETTING_SERVICE_WWW_HOST}
  volumes:
    -
      consistency: cached
      source: ../
      target: ${APPSETTING_SERVICE_WWW_TARGET}
      type: bind
  working_dir: ${APPSETTING_SERVICE_WWW_TARGET}/test
  extra_hosts:
    - "host.docker.internal:host-gateway"
  ports: [ "9323:9323" ]